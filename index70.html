<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Puzzle Challenge</title>

<style>

body{
font-family: Arial;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
margin:0;
padding:0;
}

header{
padding:30px;
font-size:35px;
font-weight:bold;
}

.container{
background:white;
color:black;
width:60%;

}

button{
background:#2c5364;

}

</style>

</head>

<body>

<header>
Ultimate Puzzle Challenge
</header>

<div class="container">

<h3 id="result"></h3>

</div>

<div class="footer">
Directed by Sara Hamdi
</div>

<script>

let index=0;

function nextPuzzle(){
document.getElementById("puzzle").innerText=puzzles[index].q;
document.getElementById("result").innerText="";
index++;
if(index>=puzzles.length) index=0;
}

function checkAnswer(){

let user=document.getElementById("answer").value.toLowerCase();

let correct=puzzles[index-1].a;

if(user.includes(correct)){
document.getElementById("result").innerText="Correct!";
}
else{
document.getElementById("result").innerText="Wrong answer!";
}

}

}

</script>
